    20      def to_frames(self, time: np.ndarray) -> tuple[int, int]:
    21          if len(time) < 2:
    22              return 1, 1
    23          dt = np.median(np.diff(time))
    24          window = max(int(round(self.window_s / dt)), 1)
    25          step = max(int(round(self.step_s / dt)), 1)
    26          return window, step
