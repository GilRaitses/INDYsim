"""Helpers that convert between historical and unified H5 layouts."""

from __future__ import annotations

from dataclasses import dataclass
from pathlib import Path
from typing import Iterable

import h5py

from ..schema import DEFAULT_SCHEMA, UnifiedH5Schema


@dataclass
class OldSchemaTranslator:
    """Translate between legacy INDYsim exports and the unified schema."""

    schema: UnifiedH5Schema = DEFAULT_SCHEMA

    legacy_time_keys: tuple[str, ...] = ("eti", "elapsed_time")
    legacy_global_root: str = "global_quantities"
    legacy_track_root: str = "tracks"

    def to_unified(self, source: Path | str, dest: Path | str) -> None:
        """Convert ``source`` H5 file into ``dest`` following the unified schema."""

        src_path = Path(source)
        dest_path = Path(dest)
        with h5py.File(src_path, "r") as src, h5py.File(dest_path, "w") as dst:
            self.schema.ensure(dst)
            # Copy metadata
            if "metadata" in src:
                dst_meta = dst.require_group("metadata")
                for key, value in src["metadata"].attrs.items():
                    dst_meta.attrs[key] = value
            dst["metadata"].attrs.setdefault("schema_version", "1.0.0")
            dst["metadata"].attrs.setdefault("source", "translator")

            # Copy time vector
            time_vector = None
            for key in self.legacy_time_keys:
                if key in src:
                    time_vector = src[key][...]
                    break
            if time_vector is not None:
                dst.require_group("global_quantities")
                if "time" in dst["global_quantities"]:
                    del dst["global_quantities"]["time"]
                dst["global_quantities"].create_dataset("time", data=time_vector)

            # Copy global quantities
            if self.legacy_global_root in src:
                dst_globals = dst.require_group("global_quantities")
                for name, grp in src[self.legacy_global_root].items():
                    if not isinstance(grp, h5py.Group):
                        continue
                    target = dst_globals.require_group(name)
                    for dataset_name, dataset in grp.items():
                        if dataset_name in target:
                            del target[dataset_name]
                        target.create_dataset(dataset_name, data=dataset[...])
                    for attr_name, attr_value in grp.attrs.items():
                        target.attrs[attr_name] = attr_value

            # Copy tracks
            if self.legacy_track_root in src:
                dst_tracks = dst.require_group("tracks")
                for name, grp in src[self.legacy_track_root].items():
                    if name in dst_tracks:
                        del dst_tracks[name]
                    dst.copy(grp, dst_tracks, name=name)

    def from_unified(self, source: Path | str, dest: Path | str) -> None:
        """Convert ``source`` unified file to legacy layout (best effort)."""

        src_path = Path(source)
        dest_path = Path(dest)
        with h5py.File(src_path, "r") as src, h5py.File(dest_path, "w") as dst:
            # Basic copy
            for group_name in ("metadata", "tracks", "analysis"):
                if group_name in src:
                    src.copy(group_name, dst, name=group_name)

            # Global quantities as legacy expectation
            dst_globals = dst.create_group(self.legacy_global_root)
            if "global_quantities" in src:
                src_globals = src["global_quantities"]
                for name, grp in src_globals.items():
                    if not isinstance(grp, h5py.Group):
                        continue
                    target = dst_globals.create_group(name)
                    for dataset_name, dataset in grp.items():
                        target.create_dataset(dataset_name, data=dataset[...])
                    for attr_name, attr_value in grp.attrs.items():
                        target.attrs[attr_name] = attr_value
                if "time" in src_globals:
                    dst.create_dataset("eti", data=src_globals["time"][...])

    def is_legacy(self, path: Path | str) -> bool:
        """Heuristic to detect legacy INDYsim files."""

        with h5py.File(path, "r") as handle:
            has_time = any(key in handle for key in self.legacy_time_keys)
            has_tracks = self.legacy_track_root in handle
            has_analysis = "analysis" not in handle
