    41      def validate(self, handle: h5py.File, *, strict: bool = False) -> List[str]:
    42          """Validate ``handle`` against the schema.
    43
    44          Parameters
    45          ----------
    46          handle:
    47              Open ``h5py.File`` pointing to the experiment file.
    48          strict:
    49              When ``True`` the validator will fail on missing optional fields as
    50              well. By default optional datasets and groups are tolerated.
