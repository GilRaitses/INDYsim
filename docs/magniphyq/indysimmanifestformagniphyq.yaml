    29  def _rolling_windows(values: np.ndarray, window: int, step: int) -> Iterable[np.ndarray]:
    30      for start in range(0, len(values) - window + 1, step):
    31          yield values[start : start + window]
    32
    33
    34  def compute_windowed_features(
    35      signal: GlobalSignal,
    36      window: WindowSpec,
    37      statistics: Sequence[str] = ("mean", "std", "min", "max"),
    38  ) -> pd.DataFrame:
    39      """Compute sliding window features for a global signal."""
    40
    41      time = signal.time if signal.time is not None else np.arange(len(signal.values))
    42      window_frames, step_frames = window.to_frames(time)
    43      if window_frames > len(signal.values):
    44          return pd.DataFrame(columns=[f"{signal.name}_{stat}" for stat in statistics])
    45
    46      rows = []
    47      index = []
    48      for start_idx, chunk in enumerate(_rolling_windows(signal.values, window_frames, step_frames)):
    49          if len(chunk) < window.min_count:
    50              continue
    51          stats = {
    52              "mean": float(np.mean(chunk)),
    53              "std": float(np.std(chunk, ddof=1)) if len(chunk) > 1 else 0.0,
    54              "min": float(np.min(chunk)),
    55              "max": float(np.max(chunk)),
    56              "median": float(np.median(chunk)),
    57          }
    58          rows.append({f"{signal.name}_{stat}": stats[stat] for stat in statistics if stat in stats})
    59          center_idx = start_idx * step_frames + window_frames // 2
    60          index.append(time[min(center_idx, len(time) - 1)])
    61      frame = pd.DataFrame(rows, index=index)
    62      frame.index.name = "time"
    63      return frame
