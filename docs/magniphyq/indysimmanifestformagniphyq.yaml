+"""InDySim processing toolkit."""
+
+from .schema import UnifiedH5Schema, DEFAULT_SCHEMA, SCHEMA_VERSION
+from .pipeline import populate_analysis_fields
+
+__all__ = [
+    "UnifiedH5Schema",
+    "DEFAULT_SCHEMA",
+    "SCHEMA_VERSION",
+    "populate_analysis_fields",
...
+    description: str
+    datasets: tuple[DatasetSpec, ...] = field(default_factory=tuple)
+    attributes: Mapping[str, str] = field(default_factory=dict)
+    required: bool = True
+
+
+@dataclass(frozen=True)
+class UnifiedH5Schema:
+    """Schema definition for unified InDySim/Mechanosensation H5 layout."""
+
+    groups: tuple[GroupSpec, ...]
+
+    def dataset_index(self) -> Dict[str, DatasetSpec]:
+        return {dataset.path: dataset for group in self.groups for dataset in group.datasets}
+
+    def validate(self, handle: h5py.File, *, strict: bool = False) -> List[str]:
+        """Validate ``handle`` against the schema.
+
+        Parameters
+        ----------
+        handle:
+            Open ``h5py.File`` pointing to the experiment file.
+        strict:
+            When ``True`` the validator will fail on missing optional fields as
+            well. By default optional datasets and groups are tolerated.
+
+        Returns
+        -------
+        list[str]
+            A list of human readable warnings/errors. An empty list implies that
+            all required elements are present.
+        """
+
+        messages: List[str] = []
+        for group in self.groups:
+            if group.path not in handle:
+                if group.required or strict:
+                    messages.append(f"missing group: {group.path}")
+                continue
+
+            grp = handle[group.path]
+            for attr_name, attr_desc in group.attributes.items():
+                if attr_name not in grp.attrs:
+                    messages.append(
+                        f"group {group.path!r} missing attribute '{attr_name}' ({attr_desc})"
+                    )
+
+            for dataset in group.datasets:
+                if dataset.path not in handle:
+                    if dataset.required or strict:
+                        messages.append(f"missing dataset: {dataset.path}")
+                    continue
+                dset = handle[dataset.path]
+                if dataset.dtype and str(dset.dtype) != dataset.dtype:
+                    messages.append(
+                        f"dataset {dataset.path} has dtype {dset.dtype}, expected {dataset.dtype}"
+                    )
+        return messages
+
+    def ensure(self, handle: h5py.File) -> None:
+        """Ensure the minimal group structure exists in ``handle``."""
+
+        for group in self.groups:
+            if group.path not in handle:
+                handle.require_group(group.path)
+            grp = handle[group.path]
+            for attr_name, attr_desc in group.attributes.items():
+                grp.attrs.setdefault(attr_name, attr_desc)
+
+
+SCHEMA_VERSION = "1.0.0"
+
+
+DEFAULT_SCHEMA = UnifiedH5Schema(
+    groups=(
+        GroupSpec(
+            path="metadata",
+            description="Experiment level metadata",
+            attributes={
+                "schema_version": SCHEMA_VERSION,
+                "source": "indysim",
+            },
+        ),
+        GroupSpec(
+            path="global_quantities",
+            description="Experiment wide signals such as LEDs or stimuli.",
+            datasets=(
+                DatasetSpec(
+                    path="global_quantities/time",
+                    description="Elapsed time for each frame.",
+                    dtype="float64",
+                ),
+            ),
+        ),
+        GroupSpec(
+            path="tracks",
+            description="Per animal tracks with positions, kinematics and behaviours.",
+        ),
+        GroupSpec(
+            path="analysis/cycles",
+            description="Cycle level summaries produced by the processing pipeline.",
+        ),
+        GroupSpec(
+            path="analysis/features",
+            description="Windowed feature tables for tracks and global quantities.",
+        ),
+        GroupSpec(
+            path="analysis/events",
+            description="Detected events derived from raw signals.",
+        ),
+    ),
+)
+
+
+def describe_schema(schema: UnifiedH5Schema = DEFAULT_SCHEMA) -> Mapping[str, Mapping[str, str]]:
+    """Return a mapping usable when rendering documentation tables."""
+
+    return {
+        group.path: {
+            "description": group.description,
+            "datasets": ", ".join(dataset.path for dataset in group.datasets) or "—",
+        }
+        for group in schema.groups
+    }
