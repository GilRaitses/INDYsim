    14  | `indysim.io` | High level H5 access (`ExperimentIO`) and reversible translators for legacy exports. |
    15  | `indysim.processing` | Pure computation utilities (features, events, cycles, metadata). |
    16  | `indysim.pipeline` | Orchestrates IO and processing into a single entry point for GUI/job runner usage. |
    17  | `indysim.experimental` | Sandbox for prototypes that should not leak into the stable interface. |
    18
    19  The stable modules expose a minimal API that mirrors the mechanosensation
    20  backend, allowing the shared browser workspace to call into either project
    21  without bespoke glue code.
    22
    23  ## Unified H5 schema
    24
    25  The schema keeps familiar group names while ensuring a single analysis branch is
    26  available for both simulation and experimental recordings.
    27
    28  ```
    29  root
    30  ├── metadata (attrs: schema_version, source)
    31  ├── global_quantities
    32  │   ├── time (dataset)
    33  │   └── <stimulus>/<yData, time, attrs>
    34  ├── tracks
    35  │   └── track_<id>
    36  │       ├── points/<head, mid, tail, …>
    37  │       ├── derived_quantities/<speed, theta, …>
    38  │       ├── state/<behaviour flags>
    39  │       └── time (optional)
    40  └── analysis
    41      ├── features/<branch>/<track_id>/<columns>
    42      ├── events/<branch>/<event_name>/<columns>
    43      └── cycles/<branch>/default/<columns>
    44  ```
    45
    46  `indysim.schema.DEFAULT_SCHEMA` is versioned (`SCHEMA_VERSION = "1.0.0"`) and
    47  can validate or auto-initialise an experiment file. The layout matches the
    48  mechanosensation expectations while preserving INDYsim track naming.
    49
    50  ### Legacy compatibility
    51
    52  `indysim.io.OldSchemaTranslator` provides reversible conversion helpers:
    53
    54  - `to_unified`: wraps historical exports (with root-level `eti` datasets) into
    55    the unified structure.
    56  - `from_unified`: rebuilds a legacy layout for pipelines that still require the
    57    old format.
    58
    59  The public pipeline automatically detects legacy files and writes a `.legacy`
    60  backup before converting in-place.
    61
    62  ## Processing pipeline
    63
    64  `indysim.pipeline.populate_analysis_fields(path, config)` is the single entry
    65  point used by the GUI and job runner. It performs the following steps:
    66
    67  1. Ensure (and, if configured, auto-convert) the input file matches the unified
    68     schema.
    69  2. Merge experiment metadata with the provided configuration.
    70  3. Compute windowed track features (`WindowSpec`) and store them beneath
    71     `analysis/features/<branch>/`.
    72  4. Detect threshold-based events for global or per-track signals.
    73  5. Summarise events into cycle-level tables.
    74  6. Persist all derived tables back into the H5 file and return them for in-memory
    75     use by callers.
    76
    77  The configuration classes allow feature window sizes, event rules, cycle
    78  summary settings, metadata overrides, and target analysis branch selection to be
    79  shared across projects.
    80
    81  ## Writing new utilities
    82
    83  When adding new processing steps:
    84
    85  1. Implement the computation inside `indysim.processing` as a pure function.
    86  2. Extend `ExperimentIO` if new IO helpers are required.
    87  3. Update `PipelineConfig` so the job runner can feed the new step without
    88     touching GUI logic.
    89  4. Document the change in this guide to keep the shared platform aligned.
    90
    91  This separation keeps IO, computation, and presentation concerns decoupled,
    92  allowing the browser workspace to trigger analyses without inheriting plotting or
    93  legacy details.
