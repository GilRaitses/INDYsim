+#!/usr/bin/env python3
+"""Populate analysis outputs for an InDySim experiment file."""
+
+from __future__ import annotations
+
+import argparse
+from pathlib import Path
+
+from indysim.pipeline import EventConfig, PipelineConfig, populate_analysis_fields
+from indysim.processing.events import ThresholdRule
+from indysim.processing.features import WindowSpec
+
+
+def build_parser() -> argparse.ArgumentParser:
+    parser = argparse.ArgumentParser(description=__doc__)
+    parser.add_argument("h5_path", type=Path, help="Path to the experiment H5 file")
+    parser.add_argument("--window", type=float, default=1.0, help="Sliding window size in seconds")
+    parser.add_argument("--step", type=float, default=0.5, help="Sliding window step in seconds")
+    parser.add_argument(
+        "--event", action="append", default=[], help="Event specification <name>:<source>:<threshold>"
+    )
+    parser.add_argument(
+        "--branch", default="stable", help="Analysis branch name to isolate experimental outputs"
+    )
+    parser.add_argument(
+        "--no-legacy", dest="legacy", action="store_false", help="Disable automatic legacy conversion"
+    )
+    parser.set_defaults(legacy=True)
+    return parser
+
+
+def parse_events(raw_events: list[str]) -> list[EventConfig]:
+    events: list[EventConfig] = []
+    for item in raw_events:
+        try:
+            name, source, threshold = item.split(":", 2)
+            threshold_value = float(threshold)
+        except ValueError as exc:  # pragma: no cover - defensive
+            raise SystemExit(f"Invalid event specification: {item!r}") from exc
+        rule = ThresholdRule(threshold=threshold_value)
+        events.append(EventConfig(name=name, source=source, rule=rule))
+    return events
+
+
+def main() -> None:
+    parser = build_parser()
+    args = parser.parse_args()
+    config = PipelineConfig(
+        window=WindowSpec(window_s=args.window, step_s=args.step),
+        events=parse_events(args.event),
+        branch=args.branch,
+        auto_convert_legacy=args.legacy,
+    )
+    populate_analysis_fields(args.h5_path, config)
+
+
+if __name__ == "__main__":  # pragma: no cover
+    main()
