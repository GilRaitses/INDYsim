root@b07813323194:/workspace# cat <<'EOF' > INDYsim/docs/developer_guide.md
> # InDySim Processing Toolkit Developer Guide
>
> This guide summarises the refactored module layout and unified H5 schema that
> let the InDySim utilities interoperate with the mechanosensation backend.
>
> ## Module layout
>
> All reusable Python modules live under `src/indysim/` and are split into stable
> and experimental branches:
>
> | Module | Responsibility |
> | ------ | -------------- |
> | `indysim.schema` | Declarative description of the unified H5 hierarchy and schema helpers. |
> | `indysim.io` | High level H5 access (`ExperimentIO`) and reversible translators for legacy exports. |
> | `indysim.processing` | Pure computation utilities (features, events, cycles, metadata). |
> | `indysim.pipeline` | Orchestrates IO and processing into a single entry point for GUI/job runner usage. |
> | `indysim.experimental` | Sandbox for prototypes that should not leak into the stable interface. |
>
> The stable modules expose a minimal API that mirrors the mechanosensation
> backend, allowing the shared browser workspace to call into either project
> without bespoke glue code.
>
> ## Unified H5 schema
>
> The schema keeps familiar group names while ensuring a single analysis branch is
> available for both simulation and experimental recordings.
>
> ```
> root
> ├── metadata (attrs: schema_version, source)
> ├── global_quantities
> │   ├── time (dataset)
> │   └── <stimulus>/<yData, time, attrs>
> ├── tracks
> │   └── track_<id>
> │       ├── points/<head, mid, tail, …>
> │       ├── derived_quantities/<speed, theta, …>
> │       ├── state/<behaviour flags>
> │       └── time (optional)
> └── analysis
>     ├── features/<branch>/<track_id>/<columns>
>     ├── events/<branch>/<event_name>/<columns>
>     └── cycles/<branch>/default/<columns>
> ```
>
> `indysim.schema.DEFAULT_SCHEMA` is versioned (`SCHEMA_VERSION = "1.0.0"`) and
> can validate or auto-initialise an experiment file. The layout matches the
> mechanosensation expectations while preserving INDYsim track naming.
>
> ### Legacy compatibility
>
> `indysim.io.OldSchemaTranslator` provides reversible conversion helpers:
>
> - `to_unified`: wraps historical exports (with root-level `eti` datasets) into
>   the unified structure.
> - `from_unified`: rebuilds a legacy layout for pipelines that still require the
>   old format.
>
> The public pipeline automatically detects legacy files and writes a `.legacy`
> backup before converting in-place.
>
> ## Processing pipeline
>
> `indysim.pipeline.populate_analysis_fields(path, config)` is the single entry
> point used by the GUI and job runner. It performs the following steps:
>
> 1. Ensure (and, if configured, auto-convert) the input file matches the unified
>    schema.
> 2. Merge experiment metadata with the provided configuration.
> 3. Compute windowed track features (`WindowSpec`) and store them beneath
>    `analysis/features/<branch>/`.
> 4. Detect threshold-based events for global or per-track signals.
> 5. Summarise events into cycle-level tables.
> 6. Persist all derived tables back into the H5 file and return them for in-memory
>    use by callers.
>
> The configuration classes allow feature window sizes, event rules, cycle
> summary settings, metadata overrides, and target analysis branch selection to be
> shared across projects.
>
> ## Writing new utilities
>
> When adding new processing steps:
>
> 1. Implement the computation inside `indysim.processing` as a pure function.
> 2. Extend `ExperimentIO` if new IO helpers are required.
> 3. Update `PipelineConfig` so the job runner can feed the new step without
>    touching GUI logic.
> 4. Document the change in this guide to keep the shared platform aligned.
>
> This separation keeps IO, computation, and presentation concerns decoupled,
> allowing the browser workspace to trigger analyses without inheriting plotting or
> legacy details.
