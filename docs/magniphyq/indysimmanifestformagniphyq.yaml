    13  @dataclass
    14  class OldSchemaTranslator:
    15      """Translate between legacy INDYsim exports and the unified schema."""
    16
    17      schema: UnifiedH5Schema = DEFAULT_SCHEMA
    18
    19      legacy_time_keys: tuple[str, ...] = ("eti", "elapsed_time")
    20      legacy_global_root: str = "global_quantities"
    21      legacy_track_root: str = "tracks"
    22
    23      def to_unified(self, source: Path | str, dest: Path | str) -> None:
    24          """Convert ``source`` H5 file into ``dest`` following the unified schema."""
    25
    26          src_path = Path(source)
    27          dest_path = Path(dest)
    28          with h5py.File(src_path, "r") as src, h5py.File(dest_path, "w") as dst:
    29              self.schema.ensure(dst)
    30              # Copy metadata
    31              if "metadata" in src:
    32                  dst_meta = dst.require_group("metadata")
    33                  for key, value in src["metadata"].attrs.items():
    34                      dst_meta.attrs[key] = value
    35              dst["metadata"].attrs.setdefault("schema_version", SCHEMA_VERSION)
    36              dst["metadata"].attrs.setdefault("source", "translator")
    37
    38              # Copy time vector
    39              time_vector = None
    40              for key in self.legacy_time_keys:
    41                  if key in src:
    42                      time_vector = src[key][...]
    43                      break
    44              if time_vector is not None:
    45                  dst.require_group("global_quantities")
    46                  if "time" in dst["global_quantities"]:
    47                      del dst["global_quantities"]["time"]
    48                  dst["global_quantities"].create_dataset("time", data=time_vector)
    49
    50              # Copy global quantities
    51              if self.legacy_global_root in src:
    52                  dst_globals = dst.require_group("global_quantities")
    53                  for name, grp in src[self.legacy_global_root].items():
    54                      if not isinstance(grp, h5py.Group):
    55                          continue
    56                      target = dst_globals.require_group(name)
    57                      for dataset_name, dataset in grp.items():
    58                          if dataset_name in target:
    59                              del target[dataset_name]
    60                          target.create_dataset(dataset_name, data=dataset[...])
    61                      for attr_name, attr_value in grp.attrs.items():
    62                          target.attrs[attr_name] = attr_value
    63
    64              # Copy tracks
    65              if self.legacy_track_root in src:
    66                  dst_tracks = dst.require_group("tracks")
    67                  for name, grp in src[self.legacy_track_root].items():
    68                      if name in dst_tracks:
    69                          del dst_tracks[name]
    70                      src.copy(grp, dst_tracks, name=name)
