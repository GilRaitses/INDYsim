    56              all required elements are present.
    57          """
    58
    59          messages: List[str] = []
    60          for group in self.groups:
    61              if group.path not in handle:
    62                  if group.required or strict:
    63                      messages.append(f"missing group: {group.path}")
    64                  continue
    65
    66              grp = handle[group.path]
    67              for attr_name, attr_desc in group.attributes.items():
    68                  if attr_name not in grp.attrs:
    69                      messages.append(
    70                          f"group {group.path!r} missing attribute '{attr_name}' ({attr_desc})"
    71                      )
    72
    73              for dataset in group.datasets:
    74                  if dataset.path not in handle:
    75                      if dataset.required or strict:
    76                          messages.append(f"missing dataset: {dataset.path}")
    77                      continue
    78                  dset = handle[dataset.path]
    79                  if dataset.dtype and str(dset.dtype) != dataset.dtype:
    80                      messages.append(
    81                          f"dataset {dataset.path} has dtype {dset.dtype}, expected {dataset.dtype}"
    82                      )
