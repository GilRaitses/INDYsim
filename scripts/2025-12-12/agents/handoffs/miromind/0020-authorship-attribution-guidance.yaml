# Research Prompt: Authorship and Attribution Best Practices

## Background

I am preparing to submit a manuscript titled **"An Analytic Hazard Kernel for Optogenetically-Driven Larval Reorientation"** to bioRxiv. Before finalizing the author list and acknowledgments, I need guidance on proper attribution following established research ethics guidelines.

## The Situation

### Data Source
- The experimental data (larval tracking under optogenetic stimulation) was collected in **Mirna's lab**
- I received the data in processed form (HDF5 files) for analysis
- The experiments used GMR61 *Drosophila* larvae with channelrhodopsin expression
- Data includes 14 experiments across 4 conditions (2×2 factorial design)

### People Involved

| Person | Role | Contribution |
|--------|------|--------------|
| **Gil Raitses** (me) | Graduate student / Analyst | All computational analysis: hazard model development, gamma-difference kernel fitting, factorial analysis, trajectory simulation, manuscript writing, figure generation, code development |
| **Devindi Goonawardhana ("Dev")** | Experimentalist | Collected all experimental data (larval tracking, optogenetic stimulation), ran experiments, processed raw video to tracking data |
| **Mirna Mihovilovic-Skanata** | Lab PI | Provided lab resources, experimental infrastructure, likely supervised experimental design, may have contributed to experimental conception |
| **Ki Young Jeong** | Course instructor | Teaching context where this analysis was developed; may have provided guidance on analysis approach |

### What I Did (My Contributions)
1. **Model Development**: Conceived and implemented the gamma-difference hazard kernel
2. **Statistical Analysis**: NB-GLM fitting, factorial analysis, cross-validation, GLMM robustness check
3. **Validation**: Time-rescaling test, PSTH correlation, rate ratio metrics
4. **Simulation**: RUN/TURN trajectory simulator
5. **Manuscript**: All writing, all figures, all code
6. **Novel Contributions**: 
   - The 6-parameter analytic kernel form (vs 12-basis raised-cosine)
   - Factorial extension showing intensity/background effects
   - Interpretation of kernel parameters in biological terms

### What I Did NOT Do
1. Design the experiments
2. Collect the data
3. Build the tracking infrastructure
4. Create the optogenetic stimulation system
5. Develop the larval tracking algorithms

