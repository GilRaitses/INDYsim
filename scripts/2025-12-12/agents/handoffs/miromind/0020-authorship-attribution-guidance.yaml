### Q1: Authorship Criteria

According to ICMJE (International Committee of Medical Journal Editors) and CRediT (Contributor Roles Taxonomy) guidelines:

1. **Who qualifies as an author?**
   - Does data collection alone qualify for authorship?
   - Does providing data (without involvement in analysis or writing) qualify?
   - Does lab PI supervision of data collection qualify?
   - Does course instruction qualify?

2. **What are the four ICMJE criteria?**
   - Substantial contributions to conception/design OR acquisition/analysis/interpretation
   - Drafting OR critical revision of manuscript
   - Final approval of version to be published
   - Agreement to be accountable for all aspects

