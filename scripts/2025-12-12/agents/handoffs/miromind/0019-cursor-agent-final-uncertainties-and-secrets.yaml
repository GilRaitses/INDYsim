## Current Phase and Context

### Project Summary
INDYsim models when Drosophila larvae initiate reorientation events during 
optogenetic stimulation using a negative-binomial GLM with a gamma-difference 
temporal kernel.

### What We've Built
1. **Single-condition hazard model** (R² = 0.968, rate ratio = 0.97)
   - 6-parameter gamma-difference kernel
   - Two timescales: τ₁ = 0.29s (fast), τ₂ = 3.81s (slow)
   - Calibrated to match empirical event rates

2. **Factorial extension** (2×2 design)
   - Factor I: LED1 intensity (0→250 vs 50→250 PWM)
   - Factor C: LED2 background (Constant 7 PWM vs Cycling 5-15 PWM)
   - 7,288 events, 623 tracks, 12 experiments
   - All 8 coefficients significant (p < 0.05)

3. **Key findings**
   - Intensity effect: 66% weaker suppression for 50→250 (partial adaptation)
   - Cycling effect: 15% stronger suppression (reduced adaptation from oscillating background)
   - Kernel shape invariant across conditions (r > 0.94)
   - Baseline and amplitude effects are dissociable

---

## Uncertainties

### 1. Fixed-Effects Model (Acknowledged in Paper)
**Issue**: We use statsmodels NB-GLM without random effects for track/experiment.
**Reality**: Bambi/PyMC failed to install on Python 3.14.
**CV shows**: 58% pass rate (7/12), σ = 0.31 - substantial between-experiment variance.
**Paper says**: "A mixed-effects extension (GLMM) would be a natural refinement."

**Uncertainty**: Is this acknowledgment sufficient, or do reviewers expect GLMM results?

### 2. Event Definition Mixing
**Issue**: 77% of events have zero measured duration ("onset events").
**Reality**: These may be detection artifacts, micro head sweeps, or frame-by-frame noise.
**Paper says**: Two-tier usage (all for hazard, filtered for trajectories).

**Uncertainty**: Are we fitting to noise? Could this inflate our N artificially?

### 3. Interaction Power
**Issue**: β_{IC} = -0.119 is significant (p = 0.019) but we claim ~30-40% power.
**Reality**: This power estimate is rough, not formally calculated.
**Paper says**: "Given limited power for this effect (~30-40%), we interpret this cautiously."

**Uncertainty**: Should we actually compute power, or is the rough estimate acceptable?

### 4. Cycling Background Interpretation
**Issue**: We interpret 15% stronger suppression as "reduced adaptation."
**Reality**: This is speculative - we have no direct evidence of adaptation state.
**Alternatives**: Could be attentional modulation, arousal, or artifact.

**Uncertainty**: Is "reduced adaptation" too strong a claim?

### 5. Time-Rescaling Violation
**Issue**: 13% deviation from Poisson assumption (mean rescaled IEI = 0.87).
**Paper says**: "Suggestive of short-term dependencies such as refractoriness."

**Uncertainty**: Should we add a refractory kernel, or is 13% acceptable?

---

## Doubts

### 1. Is the Factorial Extension Necessary?
The single-condition model is very strong. The factorial adds complexity but:
- The 15% cycling effect is modest
- The interaction is small and underpowered
- CV pass rate dropped from ~100% to 58%

**Doubt**: Would the paper be stronger as a focused methods paper without factorial?

### 2. Are We Overfitting?
8 parameters for 7,288 events seems fine (0.1% ratio), but:
- Events are not independent (clustered by track/experiment)
- Effective N may be closer to 12 experiments or 623 tracks

**Doubt**: Is our model-to-data ratio actually reasonable?

### 3. Kernel Shape Invariance Assumption
We assume τ₁, τ₂ are identical across conditions. Cross-condition correlations > 0.94 support this, but:
- We didn't formally test shape equivalence
- Could miss subtle condition-specific dynamics

**Doubt**: Should we have tested nested models (shape-varying vs amplitude-only)?

---

## Secrets (Things We Haven't Disclosed)

### 1. Anomalous Experiments Excluded
Two experiments (202510291652, 202510291713) had 10-20× more events than others.
**We excluded them** without rigorous justification.

**Secret**: We don't know why they had more events. Annotation differences? Different behavior?

### 2. Calibration Factor Origin
The intercept was calibrated post-hoc (factor = 1.695) to match empirical rates.
**Paper says**: "The intercept was calibrated..."

**Secret**: This is essentially curve-fitting to get the right answer. Is this kosher?

### 3. LED Timing Assumed Identical
We assumed LED timing (10s ON / 20s OFF) is identical across all experiments.
**We verified this from data**, but:

**Secret**: We didn't independently verify from experiment logs/protocols.

### 4. "Cycling" vs "Temp" Discovery
We only realized mid-analysis that "Temp" means "Timed/Cycling", not temperature.
**Paper now correctly describes it**, but:

**Secret**: Our initial interpretations were based on a temperature hypothesis. Did this bias our analysis design?

### 5. Trajectory Simulation Not Fully Validated
The RUN/TURN simulator produces reasonable turn rates, but:
- We only validated event timing, not trajectories
- No spatial validation (paths, distributions)
- Turn angle/duration distributions are empirical but from limited data

**Secret**: Trajectory simulation is more of a demonstration than a validated model.

